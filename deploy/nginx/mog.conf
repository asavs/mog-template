server {
    listen 80;
    server_name _;

    root /var/www/mog;
    index index.html;

    # Compress text assets on the fly. The JS bundle is ~3.5 MB uncompressed;
    # GLB meshes also shrink meaningfully. Clients cache the result via the
    # Cache-Control headers below, so the CPU cost is per cache miss.
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types application/javascript text/css application/json image/svg+xml model/gltf-binary application/octet-stream application/wasm;

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /models/ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location /skybox/ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location /audio/ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location / {
        # index.html must revalidate on every load (ETag/304) so a fresh
        # deploy is picked up immediately instead of heuristically cached.
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    location /beta/assets/ {
        alias /var/www/mog-beta/assets/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /beta/models/ {
        alias /var/www/mog-beta/models/;
        add_header Cache-Control "public, max-age=86400";
    }

    location /beta/skybox/ {
        alias /var/www/mog-beta/skybox/;
        add_header Cache-Control "public, max-age=86400";
    }

    location /beta/audio/ {
        alias /var/www/mog-beta/audio/;
        add_header Cache-Control "public, max-age=86400";
    }

    location /beta/ {
        alias /var/www/mog-beta/;
        index index.html;
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /beta/index.html;
    }

    location /v1/identity {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/database/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
