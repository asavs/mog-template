name: Deploy to beta

# Build the PR's branch on the runner, ship artifacts to mog-server,
# publish to mog-game-beta. Fires on any reviewer approval; manually
# dispatchable per-PR for the cases where the auto-trigger missed.
on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr:
        description: PR number to deploy to beta
        required: true
        type: string

# Newer beta deploys cancel older in-flight ones — opposite of prod.
# Beta represents "what is being feel-tested right now", which is always
# the most recently approved PR.
concurrency:
  group: preview-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy PR → mog-game-beta
    runs-on: ubuntu-latest
    # Filter: approved reviews on open PRs, or manual dispatch.
    # SECURITY (#185): this job checks out and BUILDS untrusted PR head code in a
    # context that holds GCP deploy credentials, so the approval that triggers it
    # must come from a trusted role (OWNER/MEMBER/COLLABORATOR) or the allowlisted
    # peer-reviewer bot. Without this gate, any random GitHub user could approve a
    # PR on this public repo and run untrusted code with our deploy credentials.
    # goob-reviewer[bot] is the automated reviewer; its author_association is NONE
    # (not a repo collaborator), so it must be allowlisted by login explicitly.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.review.state == 'approved' &&
       github.event.pull_request.state == 'open' &&
       github.event.pull_request.draft == false &&
       (contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association) ||
        github.event.review.user.login == 'goob-reviewer[bot]'))
    timeout-minutes: 20
    permissions:
      id-token: write       # required for Workload Identity Federation
      contents: read
      pull-requests: read   # for gh pr view / gh api on the PR
      checks: read          # for check-runs API access in check-ci.sh

    steps:
      - name: Resolve PR number and head SHA
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # For pull_request_review events, use the SHA *as it was when the
          # review was submitted* — that's what the reviewer approved. If new
          # commits landed since, the daemon will re-review them and fire a
          # second deploy. For workflow_dispatch, no event SHA exists, so look
          # up the current head.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUM="${{ inputs.pr }}"
            HEAD_SHA=$(gh pr view "$PR_NUM" --repo "$REPO" --json headRefOid -q .headRefOid)
          else
            PR_NUM="${{ github.event.pull_request.number }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          fi
          if [ -z "$HEAD_SHA" ]; then
            echo "ERROR: could not resolve head SHA for PR #$PR_NUM" >&2
            exit 1
          fi
          echo "pr=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying PR #$PR_NUM at $HEAD_SHA"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.sha }}
          # Fetch LFS objects so the built bundle ships real runtime assets.
          # Deploys are self-contained (a fresh VM needs no manual asset seeding).
          lfs: true

      - name: Verify CI is green on PR head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          STATE=$(bash scripts/reviewer/check-ci.sh "$REPO" "$SHA")
          echo "CI state on ${SHA}: $STATE"
          if [ "$STATE" != "success" ]; then
            echo "ERROR: CI is not green on PR head ${SHA}." >&2
            echo "Re-run this workflow via workflow_dispatch once CI completes." >&2
            exit 1
          fi
      # --- Phase 1: build artifacts on the runner ---

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build:beta

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Cache key is scoped with a `preview-` prefix so PR-author code can't
      # poison the cache that prod-deploy reads from. pull_request_review runs
      # in the base-branch (master) cache scope, so without prefix isolation
      # prod-deploy's `cargo-${{ runner.os }}-` restore-key would match an
      # entry written by a PR build. PR builds also only restore from their
      # own prior runs (no cross-PR fallback).
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/spacetimedb/target
          key: cargo-preview-${{ runner.os }}-pr-${{ steps.resolve.outputs.pr }}-${{ hashFiles('server/spacetimedb/Cargo.lock') }}
          restore-keys: |
            cargo-preview-${{ runner.os }}-pr-${{ steps.resolve.outputs.pr }}-

      - name: Build server WASM
        working-directory: server/spacetimedb
        run: cargo build --release --target wasm32-unknown-unknown

      # --- Phase 2: auth + ship artifacts to VM ---

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Stage artifacts on mog-server
        env:
          PROJECT: ${{ secrets.GCP_PROJECT }}
          SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          WASM=$(find server/spacetimedb/target/wasm32-unknown-unknown/release -maxdepth 1 -name '*.wasm' | head -1)
          if [ -z "$WASM" ]; then
            echo "ERROR: no wasm file produced by cargo build" >&2
            ls -la server/spacetimedb/target/wasm32-unknown-unknown/release/ || true
            exit 1
          fi
          echo "Shipping wasm: $WASM"

          gcloud compute ssh mog-server \
            --zone=us-central1-a \
            --project="$PROJECT" \
            --quiet \
            --command "rm -rf /tmp/deploy-${SHA} && mkdir -p /tmp/deploy-${SHA}"

          gcloud compute scp \
            --zone=us-central1-a \
            --project="$PROJECT" \
            --quiet \
            --recurse \
            "$WASM" \
            client/dist \
            scripts/apply-artifacts.sh \
            "mog-server:/tmp/deploy-${SHA}/"

      # --- Phase 3: apply on VM ---

      - name: Apply on mog-server
        env:
          PROJECT: ${{ secrets.GCP_PROJECT }}
          SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          gcloud compute ssh mog-server \
            --zone=us-central1-a \
            --project="$PROJECT" \
            --quiet \
            --command "bash /tmp/deploy-${SHA}/apply-artifacts.sh beta ${SHA}"
